name: fern
description: "Fern — красивые флеш-карточки для изучения языков (офлайн, Material You)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  auto_size_text: ^3.0.0
  flutter_colorpicker: ^1.1.0
  dynamic_color: ^1.7.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  share_plus: ^10.1.4
  file_picker: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Тестовый in-memory backend для SharedPreferencesAsync (см. test/test_helpers.dart).
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true

  assets:
    # Сам pubspec — чтобы показывать версию приложения прямо из yaml (не хардкод).
    - pubspec.yaml

  fonts:
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded.ttf
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest.ttf
