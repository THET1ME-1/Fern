name: fern
description: "Fern — красивые флеш-карточки для изучения языков (офлайн, Material You)."
publish_to: 'none'

version: 1.17.0+26

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  auto_size_text: ^3.0.0
  flutter_colorpicker: ^1.1.0
  dynamic_color: ^1.7.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  share_plus: ^10.1.4
  file_picker: ^10.2.0
  flutter_tts: ^4.2.5
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  google_mlkit_translation: ^0.13.1
  http: ^1.6.0
  youtube_explode_dart: ^3.1.0
  youtube_player_iframe: ^6.0.2
  just_audio: ^0.10.6
  # Распаковка EPUB/fb2.zip при импорте книг.
  archive: ^4.0.0
  # Читалка книг: прыжок к абзацу (восстановление позиции, закладки).
  scrollable_positioned_list: ^0.3.8
  # Чтение Anki .apkg (внутри — SQLite-база collection.anki2/anki21).
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24
  image_picker: ^1.2.3
  google_mlkit_text_recognition: ^0.15.1
  # 1.9.0 требует compileSdk 37 и ломает gradle (kotlin()) — держим 1.8.x.
  receive_sharing_intent: ">=1.8.0 <1.9.0"
  in_app_update: ^4.2.5
  cryptography: ^2.7.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Тестовый in-memory backend для SharedPreferencesAsync (см. test/test_helpers.dart).
  shared_preferences_platform_interface: ^2.4.2
  # Мок path_provider в тестах (загрузка текста книги, см. book_screen_render_test).
  path_provider_platform_interface: ^2.1.3
  plugin_platform_interface: ^2.1.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    # Сам pubspec — чтобы показывать версию приложения прямо из yaml (не хардкод).
    - pubspec.yaml
    # Колоды по умолчанию (сеются при первом запуске).
    - assets/seed/
    # Готовые колоды-стартеры для других языков (топ-слова).
    - assets/starter/
    # Офлайн-словарь частей речи (англ., Moby POS, public domain, gzip).
    - assets/pos/
    # Тексты лицензий на встроенные материалы (шрифты OFL) — экран «Лицензии».
    - assets/licenses/

  fonts:
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded.ttf
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest.ttf

# Иконка приложения (папоротник на зелёном). Генерация:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#242925"
  adaptive_icon_foreground: "assets/icon/foreground.png"
