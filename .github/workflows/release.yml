name: Release

# ── Как выпустить релиз ────────────────────────────────────────────────────
#   1. Поднять version: в app/pubspec.yaml (напр. 1.15.1+25) и описать версию
#      в CHANGELOG.md разделом «## [1.15.1] — дата». Закоммитить, запушить.
#   2. git tag v1.15.1 && git push origin v1.15.1
#   Сборка соберёт 3 APK и опубликует релиз в этом же репозитории
#   (исходники Fern приватные) — оттуда их берёт апдейтер приложения.
#
#   Вручную (без тега): вкладка Actions → Release → Run workflow.
#   Тег и version: в pubspec ДОЛЖНЫ совпадать — иначе сборка падает намеренно.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # релиз публикуется в этом же репозитории

defaults:
  run:
    working-directory: app   # проект Flutter лежит в подкаталоге app/

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Cache pub & Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-fern-${{ hashFiles('app/pubspec.lock', 'app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-fern-

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Секрет KEYSTORE_BASE64 не задан — APK будет подписан debug-ключом и не встанет поверх установленного."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # storeFile резолвится от app/android/ (rootProject.file в build.gradle.kts)
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Read version & check tag
        id: ver
        run: |
          LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')   # 1.15.0+24
          NAME=${LINE%%+*}
          CODE=${LINE##*+}
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "v$NAME" ]; then
              echo "::error::Тег $TAG не совпадает с версией в app/pubspec.yaml ($NAME). Поправь pubspec или перевесь тег."
              exit 1
            fi
          else
            TAG="v$NAME"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "Собираем Fern $NAME (versionCode $CODE), тег $TAG"

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      # Флейвор обязателен: без него Gradle собирает вариант, которого у проекта
      # нет, и flutter не находит APK («failed to produce an .apk file»).
      # github-сборка обновляется сама, play-сборка — через магазин.
      - name: Build release APK
        run: flutter build apk --release --flavor github --split-per-abi

      - name: Stage artifacts
        run: |
          mkdir -p dist
          # Имена АССЕТОВ трогать нельзя: апдейтер ищет в них токен архитектуры.
          BASE="Fern-${{ steps.ver.outputs.name }}"
          OUT=build/app/outputs/flutter-apk
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cp "$OUT/app-$abi-github-release.apk" "dist/${BASE}-${abi}.apk"
          done
          ls -lh dist/

      # Подпись важнее самой сборки: APK с чужим ключом не встанет поверх
      # установленного, а человек увидит только «установка не удалась».
      - name: Verify signing key
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | tail -1)
          FP=$("$APKSIGNER" verify --print-certs \
            "dist/Fern-${{ steps.ver.outputs.name }}-arm64-v8a.apk" \
            | grep -m1 'SHA-256 digest' | awk '{print $NF}')
          echo "Отпечаток ключа: $FP"
          if [ "$FP" != "516efd44e8af672ba7a9b101090db54698f5bb42e109c1b00ad4aaa52a2ce3a1" ]; then
            echo "::error::APK подписан НЕ тем ключом ($FP). Обновление поверх установленного не встанет — проверь секрет KEYSTORE_BASE64."
            exit 1
          fi

      - name: Generate changelog
        run: |
          # Тело релиза — раздел этой версии из CHANGELOG.md (в корне репо,
          # на уровень выше app/). Фолбэк на список коммитов, если раздела нет.
          NAME="${{ steps.ver.outputs.name }}"
          {
            echo "## Fern $NAME (build ${{ steps.ver.outputs.code }})"
            echo ""
            SECTION=$(awk -v v="$NAME" '
              $0 ~ "^## \\[" v "\\]" { found=1; next }
              found && /^## \[/       { exit }
              found                   { print }
            ' ../CHANGELOG.md)
            if [ -n "$(echo "$SECTION" | tr -d '[:space:]')" ]; then
              echo "$SECTION"
            else
              PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.ver.outputs.tag }}$" | head -1)
              if [ -n "$PREV_TAG" ]; then
                git log --no-merges --pretty=format:'- %s' "$PREV_TAG"..HEAD
              else
                git log --no-merges --pretty=format:'- %s' -n 20
              fi
            fi
          } > dist/notes.md
          echo "---- заметки ----"; cat dist/notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Fern ${{ steps.ver.outputs.name }}
          body_path: app/dist/notes.md
          make_latest: true
          files: |
            app/dist/Fern-${{ steps.ver.outputs.name }}-arm64-v8a.apk
            app/dist/Fern-${{ steps.ver.outputs.name }}-armeabi-v7a.apk
            app/dist/Fern-${{ steps.ver.outputs.name }}-x86_64.apk

  # ── iOS ────────────────────────────────────────────────────────────────────
  # Собирается НЕПОДПИСАННЫЙ .ipa: сертификата Apple у проекта нет, а без него
  # приложение всё равно ставится — Sideloadly, AltStore и TrollStore
  # подписывают файл ключом самого человека. Отдельным job'ом и после релиза:
  # macOS-раннер медленный, и его падение не должно задерживать APK.
  ios:
    runs-on: macos-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Read version
        id: ver
        run: |
          LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          NAME=${LINE%%+*}
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$NAME"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build unsigned app
        run: flutter build ios --release --no-codesign

      - name: Pack IPA
        run: |
          # .ipa — это zip с каталогом Payload внутри, больше ничего не нужно.
          mkdir -p dist/Payload
          cp -R build/ios/iphoneos/Runner.app dist/Payload/
          cd dist
          zip -qry "Fern-${{ steps.ver.outputs.name }}-unsigned.ipa" Payload
          rm -rf Payload
          ls -la

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: app/dist/Fern-${{ steps.ver.outputs.name }}-unsigned.ipa
